"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$lua\
$docker_context\
$character"""

add_newline = false

# username ÔÇö quiet anchor; you already know who you are
[username]
show_always = true
style_user = "fg:#98989d"
style_root = "bold fg:#ff453a"
format = '[$user]($style) '

# directory ÔÇö primary focal point (Apple blue)
[directory]
style = "bold fg:#0a84ff"
read_only_style = "bold fg:#98989d"
read_only = "  "
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "ÔÇª/"

# git branch ÔÇö distinct from path; classic terminal green
[git_branch]
symbol = "´äª"
style = "fg:#32d74b"
format = ' [[ $symbol $branch ](fg:#32d74b)]($style)'

# git status ÔÇö semantic colors; only shows when something is happening
[git_status]
style = "bold"
format = '([$all_status$ahead_behind]($style))'
conflicted = '[=${count}](fg:#ff453a bold)'
ahead = '[Ôçí${count}](fg:#76d6ff)'
behind = '[Ôçú${count}](fg:#76d6ff)'
diverged = '[ÔçòÔçí${ahead_count}Ôçú${behind_count}](fg:#ffd60a)'
untracked = '[?${count}](fg:#76d6ff)'
stashed = '[$](fg:#bf5af2)'
modified = '[!${count}](fg:#ffd60a)'
staged = '[+${count}](fg:#32d74b)'
renamed = '[┬╗${count}](fg:#bf5af2)'
deleted = '[Ô£ÿ${count}](fg:#ff453a)'

# language modules ÔÇö cool cyan badges; tertiary context, not competing with path/git
[nodejs]
symbol = "¾░ÄÖ"
style = "fg:#76d6ff"
format = ' [[ $symbol $version](fg:#76d6ff)]($style)'

[c]
symbol = "¯Ø▒"
style = "fg:#76d6ff"
format = ' [[ $symbol $version](fg:#76d6ff)]($style)'

[rust]
symbol = "¯×¿"
style = "fg:#ff453a"
format = ' [[ $symbol $version](fg:#ff453a)]($style)'

[golang]
