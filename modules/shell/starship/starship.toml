"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$lua\
$docker_context\
$character"""

add_newline = false

# username module
[username]
show_always = true
style_user = "bright-yellow"
style_root = "purple"
format = '[$user ]($style)'

# directory module
[directory]
style = "blue"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# git branch module
[git_branch]
symbol = ""
style = "bright-blue"
format = '[[$symbol $branch ](bright-blue)]($style)'

# git status module
[git_status]
style = "bright-blue"
format = '[[($all_status$ahead_behind )](bright-blue)]($style)'

# nodejs module
[nodejs]
symbol = "󰎙"
style = "bright-green"
format = '[[$symbol( $version) ](bright-green)]($style)'

# c module
[c]
symbol = ""
style = "white"
format = '[[$symbol( $version) ](white)]($style)'

# rust module
[rust]
symbol = ""
style = "red"
format = '[[$symbol( $version) ](red)]($style)'

# go module
[golang]
symbol = "󰟓"
style = "cyan"
format = '[[$symbol( $version) ](cyan)]($style)'

# php module
[php]
symbol = "󰌟"
style = "purple"
format = '[[$symbol( $version) ](purple)]($style)'

# java module
[java]
symbol = ""
style = "yellow"
format = '[[$symbol( $version) ](yellow)]($style)'

# kotlin module
[kotlin]
symbol = ""
style = "bright-purple"
format = '[[$symbol( $version) ](bright-purple)]($style)'

# haskell module
[haskell]
symbol = ""
style = "magenta"
format = '[[$symbol( $version) ](magenta)]($style)'

# python module
[python]
symbol = ""
style = "bright-yellow"
format = '[[$symbol( $version) ](bright-yellow)]($style)'

# lua module
[lua]
symbol = "󰢱"
style = "bright-yellow"
format = '[[$symbol( $version) ](bright-yellow)]($style)'

# docker context module
[docker_context]
symbol = "󰡨"
style = "blue"
format = '[[$symbol( $context) ](blue)]($style)'

# line break module
[line_break]
disabled = true

# character module
[character]
format = "[](bright-blue) "
